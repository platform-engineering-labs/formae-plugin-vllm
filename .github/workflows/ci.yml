name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3 AM UTC
  workflow_dispatch:
    inputs:
      run_conformance:
        description: 'Run conformance tests'
        required: false
        default: 'false'
        type: boolean
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build
        run: make build

      - name: Test
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Validate Pkl schemas
        run: |
          pkl eval formae-plugin.pkl --format json > /dev/null
          echo "Manifest validated successfully"

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Verify schema
        run: make verify-schema

  # Integration tests run against an in-process fake vLLM server (httptest) — no
  # GPU, Docker, cloud credentials or network required — so they run on every CI.
  integration-tests:
    needs: [build, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Run integration tests
        run: make install && go test -tags=integration -count=1 .

  # Conformance runs against a REAL vLLM — DOGFOODING formae's AWS plugin.
  #
  # vLLM LoRA needs a CUDA pinned-memory allocator, so a GPU is required (CPU-only
  # hosts, incl. GitHub-hosted runners, hit a vLLM bug where is_pin_memory_available
  # returns True off-WSL with no CUDA -> LoRA warmup crashes). GitHub runners have
  # no GPU, so `scripts/ci/conformance-aws.sh` has formae provision a g4dn (T4) box
  # running vLLM, runs conformance against it (VLLM_EXTERNAL), then formae destroys
  # everything (guaranteed teardown). This is the AWS GPU dogfood example, doubling
  # as the conformance gate.
  #
  # Main only (push + dispatch + nightly): AWS creds come from the org `github-pel`
  # OIDC role, whose trust is scoped to refs/heads/main of this repo. Billable
  # (~$0.13 GPU per run).
  conformance-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    timeout-minutes: 45
    permissions:
      id-token: write   # assume the AWS OIDC role
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Configure AWS credentials (assume github-pel via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::226695765433:role/github-pel
          role-session-name: vllm-conformance-${{ github.run_id }}

      - name: Install stable formae (PEL store in a user path; no sudo)
        run: |
          PEL_ROOT="$HOME/pel"
          # pelmgr (orbital) sets up a proper PEL store so `formae plugin install`
          # works. --install-path keeps it user-writable (default /opt/pel needs root).
          bash -c "$(curl -fsSL https://hub.platform.engineering/get/setup.sh)" -- \
            install --yes --channel stable --install-path "$PEL_ROOT" formae pkl
          echo "$PEL_ROOT/bin" >> "$GITHUB_PATH"
          echo "FORMAE_PEL_ROOT=$PEL_ROOT" >> "$GITHUB_ENV"
          "$PEL_ROOT/bin/formae" --help >/dev/null && echo "formae installed at $PEL_ROOT"

      - name: Conformance against a formae-provisioned GPU vLLM box (dogfood)
        env:
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          AWS_REGION: us-east-1
        run: make conformance-test-aws

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3 AM UTC
  workflow_dispatch:
    inputs:
      run_conformance:
        description: 'Run conformance tests'
        required: false
        default: 'false'
        type: boolean
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build
        run: make build

      - name: Test
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Validate Pkl schemas
        run: |
          pkl eval formae-plugin.pkl --format json > /dev/null
          echo "Manifest validated successfully"

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Verify schema
        run: make verify-schema

  # Integration tests run against an in-process fake vLLM server (httptest) — no
  # GPU, Docker, cloud credentials or network required — so they run on every CI.
  integration-tests:
    needs: [build, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Run integration tests
        run: make install && go test -tags=integration -count=1 .

  # Conformance runs against a REAL vLLM. `make conformance-test` boots a CPU-only
  # vLLM container and runs the CRUD + discovery lifecycle through a real formae
  # agent, then tears the container down. The agent is fetched from the formae hub
  # (>= minFormaeVersion in formae-plugin.pkl).
  #
  # Runs on push, PR, nightly and manual dispatch.
  #
  # Runner: GitHub's free ARM64 hosted runner (ubuntu-24.04-arm) with vLLM's arm64
  # CPU image. ARM has no AVX-512 concept, which sidesteps the x86 prebuilt image's
  # AVX-512 requirement (GitHub-hosted x86 runners expose AVX-512 only
  # inconsistently). Stays fully GitHub-hosted — no self-hosted infra.
  conformance-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Run conformance tests (boots real arm64 CPU vLLM container)
        env:
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          VLLM_IMAGE: docker.io/vllm/vllm-openai-cpu:latest-arm64
        run: make conformance-test TIMEOUT=20m

# vLLM on Kubernetes for the formae vLLM plugin example.
#
# Provisions a single-replica vLLM server (Qwen/Qwen2.5-0.5B-Instruct) with
# runtime LoRA loading enabled, a PVC to hold adapter artifacts, and a Service
# fronting the OpenAI-compatible API on :8000. formae manages adapters against
# the Service; the PVC is the adapter distribution layer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "Qwen/Qwen2.5-0.5B-Instruct"
            - "--enable-lora"
            - "--max-lora-rank"
            - "32"
          env:
            # Required so /v1/load_lora_adapter and /v1/unload_lora_adapter work.
            - name: VLLM_ALLOW_RUNTIME_LORA_UPDATING
              value: "True"
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: adapters
              mountPath: /models/adapters
      volumes:
        - name: adapters
          persistentVolumeClaim:
            claimName: vllm-adapters
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-adapters
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  labels:
    app: vllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000

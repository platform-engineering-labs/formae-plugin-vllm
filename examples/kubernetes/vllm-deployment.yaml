# vLLM on Kubernetes for the formae vLLM plugin example.
#
# Provisions a single-replica vLLM server (Qwen/Qwen2.5-0.5B-Instruct) with
# runtime LoRA loading enabled, a PVC to hold adapter artifacts, and a Service
# fronting the OpenAI-compatible API on :8000. formae manages adapters against
# the Service; the PVC is the adapter distribution layer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      # A Service named `vllm` makes Kubernetes inject Docker-style service-link
      # env vars into every pod in the namespace, including VLLM_PORT=tcp://<clusterIP>:8000.
      # vLLM reads VLLM_PORT as its own integer bind port and crash-loops on the URI
      # (ValueError → "Engine core initialization failed"). Disabling service links
      # suppresses the legacy injection while keeping the `vllm` Service and its DNS intact.
      # See https://docs.vllm.ai/en/stable/serving/env_vars.html
      enableServiceLinks: false
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.22.1
          args:
            - "--model"
            - "Qwen/Qwen2.5-0.5B-Instruct"
            - "--enable-lora"
            - "--max-lora-rank"
            - "64"
          env:
            # Required so /v1/load_lora_adapter and /v1/unload_lora_adapter work.
            - name: VLLM_ALLOW_RUNTIME_LORA_UPDATING
              value: "True"
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: adapters
              mountPath: /models/adapters
      volumes:
        - name: adapters
          persistentVolumeClaim:
            claimName: vllm-adapters
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-adapters
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  labels:
    app: vllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
